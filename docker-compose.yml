version: "3.9"

services:
  # Local PostgreSQL — used in development only
  # In production, Neon PostgreSQL is used via DATABASE_URL env var
  postgres:
    image: postgres:15-alpine
    container_name: p2v-postgres
    restart: unless-stopped
    ports:
      - "54320:5432"
    environment:
      POSTGRES_USER: p2v
      POSTGRES_PASSWORD: p2v_secret
      POSTGRES_DB: picktvoice
    volumes:
      - p2v_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2v -d picktvoice"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sao-internal

  # Sage Operator Sync — syncs operators from Sage SQL Server to Neon PostgreSQL
  sync-sage:
    build:
      context: ./sync-sage
      dockerfile: Dockerfile
    env_file: ./sync-sage/.env
    restart: unless-stopped
    networks:
      - sao-internal

  # Whisper Transcription Server — local speech-to-text via WebSocket
  transcription-server:
    build:
      context: ./transcription-server
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    env_file: ./transcription-server/.env
    restart: unless-stopped
    networks:
      - sao-internal

networks:
  sao-internal:
    driver: bridge

volumes:
  p2v_pgdata:
    driver: local
